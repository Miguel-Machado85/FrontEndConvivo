<div class="confirmacion-reserva-container">
  <div class="confirmation-page">
    <div class="confirmation-card">
      <!-- Success Icon Section -->
      <div class="icon-section">
        <div class="icon-wrapper">
          <div class="icon-container">
            <svg width="84" height="84" viewBox="0 0 84 84" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M76.3036 35.0002C77.902 42.8447 76.7629 51.0002 73.0761 58.1065C69.3893 65.2128 63.3777 70.8404 56.0439 74.0508C48.7101 77.2612 40.4973 77.8604 32.7752 75.7485C25.053 73.6365 18.2883 68.9411 13.6091 62.4452C8.92987 55.9493 6.61903 48.0455 7.06193 40.0521C7.50482 32.0586 10.6747 24.4585 16.0429 18.5193C21.4111 12.5801 28.6531 8.66071 36.5613 7.41479C44.4695 6.16887 52.5658 7.67172 59.5001 11.6727" stroke="white" stroke-width="8.75" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M31.5 38.5L42 49L77 14" stroke="white" stroke-width="8.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Heading Section -->
      <div class="heading-section">
        <h1 class="main-title">¡Perfecto!</h1>

        <div class="subtitle-container">
          <p class="subtitle">Tu reserva está confirmada</p>
          <p class="subtext">Ya puedes cerrar esta pestaña</p>
        </div>
      </div>

      <!-- Info Box -->
      <div class="info-box">
        <div class="info-content">
          <div class="info-icon">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 2.49951V7.49951" stroke="#1268C4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20.0005 2.49951V7.49951" stroke="#1268C4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M23.75 5H6.25C4.86929 5 3.75 6.11929 3.75 7.5V25C3.75 26.3807 4.86929 27.5 6.25 27.5H23.75C25.1307 27.5 26.25 26.3807 26.25 25V7.5C26.25 6.11929 25.1307 5 23.75 5Z" stroke="#1268C4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3.75 12.5H26.25" stroke="#1268C4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="info-text">
            <p class="info-title">Confirmación exitosa</p>
            <p class="info-description">Recuerda cancelar la reserva en caso de no poder asistir</p>
          </div>
        </div>
      </div>

      <!-- Close Button -->
      <button class="close-button" (click)="closeTab()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <span>Cerrar pestaña</span>
      </button>
    </div>
  </div>
</div>
